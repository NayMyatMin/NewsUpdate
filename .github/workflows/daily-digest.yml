name: Daily News Digest

on:
  schedule:
    # Run daily at 01:00 UTC (09:00 SGT)
    - cron: '0 1 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  generate-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Archive completed weeks
        run: bash scripts/organize_digests.sh

      - name: Generate daily digest
        env:
          LLM_PROVIDER: ${{ secrets.LLM_PROVIDER }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL || 'gpt-4o-mini' }}
          L2_ENABLED: ${{ secrets.L2_ENABLED || 'true' }}
          L2_OPENAI_MODEL: ${{ secrets.L2_OPENAI_MODEL || 'gpt-4o' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL || 'claude-haiku-4-5-20251001' }}
          L2_ANTHROPIC_MODEL: ${{ secrets.L2_ANTHROPIC_MODEL || 'claude-sonnet-4-20250514' }}
          EMBEDDING_MODEL: ${{ secrets.EMBEDDING_MODEL || 'text-embedding-3-small' }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          RSSHUB_BASE_URL: ${{ secrets.RSSHUB_BASE_URL || 'https://rsshub.app' }}
        run: mkdir -p logs && python main.py 2>&1 | tee logs/run.log

      - name: Commit and push digest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add digests/
          DATE=$(date -u +%Y-%m-%d)
          git diff --cached --quiet || git commit -m "Daily digest: ${DATE}"
          git pull --rebase origin main
          git push

  test:
    runs-on: ubuntu-latest
    # Run tests on PRs too
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - run: pytest tests/ -v --tb=short
